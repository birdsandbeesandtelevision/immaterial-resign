allow_embedding: false
db_schema:
  feedback:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: name
      type: string
    - admin_ui: {order: 1, width: 200}
      client_hidden: false
      name: email
      type: string
    - admin_ui: {order: 2, width: 200}
      client_hidden: false
      name: feedback
      type: string
    - admin_ui: {order: 3, width: 200}
      client_hidden: false
      name: created
      type: datetime
    indexes: []
    server: full
    title: Feedback
name: immaterial resign
package_name: immaterial_resign
runtime_options:
  client_version: '3'
  legacy_features: {bootstrap3: true, class_names: true}
  server_spec: {base: python310-minimal}
  version: 3
services:
- client_config: {enable_v2: true}
  server_config: {}
  source: /runtime/services/tables.yml
startup: {module: FeedbackFormForNothing, type: form}
startup_form: null
